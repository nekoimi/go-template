name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version tag (e.g. v0.1.0)"
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    # 镜像推送与 GH Release 仅在打 tag（v*）时执行；workflow_dispatch 只做构建/测试，避免从分支误推 latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -timeout 5m -count=1 ./...

      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/go-template-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Docker metadata (scheduler)
        id: meta-scheduler
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/go-template-scheduler
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/Dockerfile
          build-args: TARGET=cmd/server
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Build and push scheduler
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/Dockerfile
          build-args: TARGET=cmd/scheduler
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta-scheduler.outputs.tags }}
          labels: ${{ steps.meta-scheduler.outputs.labels }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
